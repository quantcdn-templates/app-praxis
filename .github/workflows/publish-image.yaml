# Publish the app-praxis image to GHCR on tag/release.
# Operators can `docker pull ghcr.io/quantcdn-templates/app-praxis:latest`
# for local testing or extend it as a base for their own roles.
name: Publish app-praxis image to GHCR

on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/quantcdn-templates/app-praxis:latest
            ghcr.io/quantcdn-templates/app-praxis:${{ github.ref_name }}
          cache-from: type=gha,scope=ghcr-praxis
          cache-to: type=gha,mode=max,scope=ghcr-praxis
